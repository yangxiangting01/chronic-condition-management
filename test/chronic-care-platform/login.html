<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>慢病管理平台 - 登录</title>
<link rel="stylesheet" href="css/base.css">
<style>
  body { background: linear-gradient(135deg, #1a365d 0%, #2E86AB 60%, #4ECDC4 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .login-wrap { width: 100%; max-width: 420px; }
  .login-logo { text-align: center; margin-bottom: 32px; color: #fff; }
  .login-logo .logo-big { font-size: 56px; margin-bottom: 8px; }
  .login-logo h1 { font-size: 24px; font-weight: 800; }
  .login-logo p { font-size: 14px; opacity: 0.8; margin-top: 4px; }
  .login-card { background: #fff; border-radius: 20px; padding: 32px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
  .role-tabs { display: flex; gap: 8px; margin-bottom: 24px; background: var(--bg); padding: 4px; border-radius: 10px; }
  .role-tab { flex: 1; padding: 10px; border-radius: 8px; font-size: 14px; font-weight: 600; color: var(--text-muted); background: transparent; border: none; cursor: pointer; transition: all 0.2s; text-align: center; }
  .role-tab.active { background: #fff; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  .role-tab .role-icon { display: block; font-size: 22px; margin-bottom: 4px; }
  .divider { display: flex; align-items: center; gap: 12px; margin: 16px 0; color: var(--text-muted); font-size: 13px; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .quick-login { display: flex; gap: 10px; }
  .quick-btn { flex: 1; padding: 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; font-weight: 600; background: #fff; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: border-color 0.2s; }
  .quick-btn:hover { border-color: var(--primary); color: var(--primary); }
  .value-list { display: flex; flex-direction: column; gap: 8px; margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border); }
  .value-item { display: flex; align-items: center; gap: 10px; font-size: 13px; color: var(--text-muted); }
  .value-item span:first-child { font-size: 18px; }
</style>
</head>
<body>
<div class="login-wrap">
  <div class="login-logo">
    <div class="logo-big">💊</div>
    <h1>慢病管理平台</h1>
    <p>社区医疗·健康管理·智能服务</p>
  </div>

  <div class="login-card">
    <div class="role-tabs">
      <button class="role-tab active" onclick="switchRole('patient', this)">
        <span class="role-icon">👤</span>患者端
      </button>
      <button class="role-tab" onclick="switchRole('doctor', this)">
        <span class="role-icon">👨‍⚕️</span>社区端
      </button>
      <button class="role-tab" onclick="switchRole('family', this)">
        <span class="role-icon">👨‍👩‍👧</span>家属端
      </button>
      <button class="role-tab" onclick="switchRole('admin', this)">
        <span class="role-icon">⚙️</span>管理后台
      </button>
    </div>

    <div id="loginForm">
      <div class="form-group">
        <label class="form-label">手机号</label>
        <input class="form-control" type="tel" placeholder="请输入手机号" id="phoneInput" value="138****8888">
      </div>
      <div class="form-group">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
          <label class="form-label" style="margin:0">验证码</label>
          <button style="font-size:12px;color:var(--primary);background:none;border:none;cursor:pointer;font-weight:600" onclick="sendCode(this)">发送验证码</button>
        </div>
        <input class="form-control" type="number" placeholder="请输入6位验证码" id="codeInput">
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;font-size:13px;color:var(--text-muted)">
        <input type="checkbox" id="agreeCheck" checked style="width:16px;height:16px;cursor:pointer">
        <label for="agreeCheck">我已阅读并同意 <a href="#" style="color:var(--primary)">《用户协议》</a> 和 <a href="#" style="color:var(--primary)">《隐私政策》</a></label>
      </div>

      <button class="btn btn-primary" style="width:100%;padding:12px;font-size:15px;border-radius:10px" onclick="doLogin()">
        登录 / 注册
      </button>

      <div class="divider">其他登录方式</div>
      <div class="quick-login">
        <button class="quick-btn" onclick="doLogin()">🔑 密码登录</button>
        <button class="quick-btn" onclick="doLogin()">🏥 医院账号</button>
        <button class="quick-btn" onclick="doLogin()">💚 微信登录</button>
      </div>
    </div>

    <div class="value-list">
      <div class="value-item"><span>📊</span><span>查看健康数据，掌握身体状况</span></div>
      <div class="value-item"><span>🤖</span><span>AI智能问诊，24小时在线解答</span></div>
      <div class="value-item"><span>👨‍⚕️</span><span>绑定社区医生，获得专属指导</span></div>
      <div class="value-item"><span>🏆</span><span>打卡积分，健康排行榜激励</span></div>
      <div class="value-item"><span>🏠</span><span>预约上门服务，社区资源一键获取</span></div>
    </div>
  </div>
</div>

<script src="js/store.js"></script>
<script src="js/db.js"></script>
<script>
  let currentRole = 'patient';
  // 初始化种子数据
  DB.init();

  function switchRole(role, btn) {
    currentRole = role;
    document.querySelectorAll('.role-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const ph = document.getElementById('phoneInput');
    if (role === 'doctor') ph.value = '13700000001';
    else if (role === 'family') ph.value = '13800000001';
    else ph.value = '13800000001';
  }

  function sendCode(btn) {
    btn.textContent = '60s后重发'; btn.disabled = true;
    let t = 60;
    const timer = setInterval(() => {
      t--; btn.textContent = t + 's后重发';
      if (t <= 0) { clearInterval(timer); btn.textContent = '发送验证码'; btn.disabled = false; }
    }, 1000);
  }

  function doLogin() {
    const phone = (document.getElementById('phoneInput').value||'').trim();
    const code  = (document.getElementById('codeInput').value||'').trim();
    if (!document.getElementById('agreeCheck').checked) {
      alert('请先同意用户协议和隐私政策'); return;
    }

    // 管理员入口
    if (currentRole === 'admin' || phone === '10000000000') {
      const admin = Store.getUsers().find(u => u.role === 'admin' && u.phone === phone);
      if (admin) { Store.setCurrentUser(admin); window.location.href = 'admin.html'; return; }
    }

    // 医生端：用手机号匹配医生
    if (currentRole === 'doctor') {
      const doc = Store.getDoctors().find(d => d.phone === phone);
      if (doc) {
        Store.setCurrentUser({ id: doc.userId || doc.id, name: doc.name, role: 'doctor', doctorId: doc.id });
        window.location.href = 'doctor.html'; return;
      }
      alert('未找到该医生账号，请确认手机号'); return;
    }

    // 患者/家属端：手机号匹配用户，验证码任意6位即可（演示）
    let user = Store.getUserByPhone(phone);
    if (!user) {
      // 自动注册
      user = {
        id: 'u' + Date.now(), role: 'patient', name: '新用户', phone,
        password: '123456', age: 0, gender: '未知', avatar: '👤',
        disease: [], level: 1, status: 'active', createdAt: new Date().toISOString()
      };
      Store.saveUser(user);
    }
    Store.setCurrentUser(user);
    window.location.href = 'index.html';
  }
</script>
</body>
</html>
